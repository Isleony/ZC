services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: crimedb
      POSTGRES_USER: crime
      POSTGRES_PASSWORD: crime
    ports: ["5432:5432"]
    volumes:
      - ./infra/postgres/init:/docker-entrypoint-initdb.d

  api:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://crime:crime@db:5432/crimedb
    ports: ["8000:8000"]
    depends_on: [db]

  web:
    build: ./frontend
    environment:
      VITE_API_URL: http://localhost:8000
    ports: ["5173:5173"]
    depends_on: [api]
